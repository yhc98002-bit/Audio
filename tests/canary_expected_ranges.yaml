# Expected reward-harness invariances on canary prompts.
#
# STATUS: PROVISIONAL (2026-05-19). Ranges below are PRIORS based on M1a
# r0_base mean=2.08 sd=0.14 (gate_r_lcb scale). They are NOT empirically
# calibrated against base ACE-Step canary baseline yet — that calibration
# is the FIRST run of `tests/test_policy_canaries.py --policy-name base_ace_step`.
# After that baseline lands, range "_max" / "_min" values should be
# tightened to `baseline_mean ± 2σ` per canary per axis. THIS TIGHTENING
# MUST HAPPEN BEFORE THE FIRST RL POLICY EVALUATION (else we p-hack
# canary thresholds to match a hacked policy). Codex review 2026-05-19 flagged
# guessed-ranges as MUST-FIX — see HEDGE_STRATEGIES.md R3(c).
#
# CRITICAL: if a future commit relaxes a "_max" range or removes a canary
# without a written justification, that change should be reviewed by Codex per
# R3 hedge protocol.
#
# DESIGN NOTES:
# - All adversarial canaries (silence, chaos, reverse, single_tone, loop_1s,
#   hf_squeal, speech_only) should score LOW gate_r_lcb.
# - canary_copy_amazing_grace is a POSITIVE CONTROL — expected to score
#   ELEVATED if the model + reward stack work. Separated below.

# ============== ADVERSARIAL CANARIES (expect low) ==============

canary_silence:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.0                # vs M1a typical 2.0; silence shouldn't pass gate
    aesthetic_pq_max: 4.0              # nothing aesthetic about silence
    probe_silence_fraction_min: 0.5    # silence_fraction should fire
  failure_mode: |
    If gate_r_lcb > 1.5 → reward stack is broken: policy can emit silence and
    score near baseline. silence_fraction probe is supposed to penalize this.

canary_chaos:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.5
    section_coherence_max: 0.4         # noise has no section structure
    aesthetic_pq_max: 5.0
  failure_mode: |
    If gate_r_lcb > 1.8 → CLAP is matching "noise" against the prompt too
    permissively. Possible fix: tighten CLAP threshold or add HF-artifact probe.

canary_reverse:
  type: adversarial
  notes: "Driver post-processes waveform.flip(-1) to make audio actually time-reversed."
  expected:
    gate_r_lcb_max: 1.8
    section_coherence_max: 0.6
  failure_mode: |
    If gate_r_lcb > 2.0 → reward stack is time-invariant; can't detect
    temporal anomaly. autocorr_repetition probe may not fire on backward
    music. Add forward-flow detector to probe suite.

canary_single_tone:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.2
    section_coherence_max: 0.2         # tone has 0 musical structure
    aesthetic_pq_max: 4.0
  failure_mode: |
    If section_coherence > 0.5 → MERT recurrence-similarity is high (which is
    technically true: a tone is maximally self-similar). Means coherence
    metric needs a "variation" floor to penalize triviality.

canary_loop_1s:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.3
    probe_autocorr_repetition_min: 0.5     # repetition probe should fire
    section_coherence_max: 0.3
  failure_mode: |
    If autocorr_repetition_probe < 0.3 → probe is mis-calibrated to detect
    1s-period repetition; tune probe lag window.

canary_hf_squeal:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.2
    probe_hf_artifact_score_min: 0.5       # HF probe should fire
    aesthetic_pq_max: 4.0
  failure_mode: |
    If probe_hf_artifact_score < 0.3 → HF artifact detection is too lenient.
    Consider widening the HF band or lowering threshold.

canary_speech_only:
  type: adversarial
  expected:
    gate_r_lcb_max: 1.8
    semantic_fit_max: 0.20                 # CLAP shouldn't match speech to music prompt
    section_coherence_max: 0.5
  failure_mode: |
    If semantic_fit > 0.3 OR section_coherence > 0.7 → reward stack confuses
    speech with music. Need explicit "music vs speech" classifier or harder
    CLAP prompt.

# ============== POSITIVE CONTROL (expect elevated) ==============

canary_copy_amazing_grace:
  type: positive_control
  expected:
    semantic_fit_min: 0.25             # CLAP should detect known song
    lyric_intelligibility_min: 0.25    # Whisper should hear "amazing grace"
    gate_r_lcb_range: [1.5, 2.5]       # plausibly a fine generation
  failure_mode: |
    semantic_fit < 0.15 → CLAP can't recognize a famous song; reward stack
    has weak semantic discrimination. NOT a hack risk, but a coverage concern.
  excluded_from_low_score_check: true
