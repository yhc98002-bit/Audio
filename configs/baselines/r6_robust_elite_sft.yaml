project: audio_diffusion_mprm
run_id: r6_robust_elite_sft_phase_a
split: dev
run_ledger_path: orbit-research/RUN_LEDGER.jsonl

model:
  name: ace_step_v15
  backbone: ace_step
  sample_rate: 44100
  duration_seconds: 60.0
  cfg_default: 5.0
  inference_steps: 50
  latent_rate_factor: 64

reward:
  beta_robust: 0.5
  lambda_probe:
    silence_fraction: 1.0
    autocorr_repetition: 1.0
    off_prompt_distance: 1.0
    hf_artifact_score: 0.5

baseline:
  rung_id: R6
  name: robust_elite_sft
  description: Former S6 Stages 0-3 (curriculum + robust LCB elites + weighted SFT). Codex-selected v1.1 method, demoted to baseline.
  seed: 0
  prompts_path: configs/prompts/dev.jsonl
  output_dir: runs/r6_robust_elite_sft
  bon_n: 8
  sft_steps: 1500
  lora_rank: 8
  learning_rate: 1.0e-5
  extras:
    elite_quantile: 0.25
    perturbations: [identity, crop, loudness, codec, fold_down, time_shift]
    evaluator_disagreement_axis_pair: [aesthetic_pq, semantic_fit]
