project: audio_diffusion_mprm
run_id: r0_base_phase_a
split: dev
run_ledger_path: orbit-research/RUN_LEDGER.jsonl

model:
  name: ace_step_v15
  backbone: ace_step
  sample_rate: 44100
  duration_seconds: 60.0
  cfg_default: 5.0
  inference_steps: 50
  latent_rate_factor: 64
  cache_dir: ~/.cache/ace_step

reward:
  beta_robust: 0.5
  lambda_probe:
    silence_fraction: 0.0
    autocorr_repetition: 0.0
    off_prompt_distance: 0.0
    hf_artifact_score: 0.0
    broken_section_indicator: 0.0

baseline:
  rung_id: R0
  name: base_sampling
  description: Base ACE-Step sampling at default CFG; reference baseline (R0).
  seed: 0
  prompts_path: configs/prompts/dev.jsonl
  output_dir: runs/r0_base
  extras:
    seeds: [0, 1, 2]
