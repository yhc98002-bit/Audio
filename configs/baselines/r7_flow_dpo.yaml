project: audio_diffusion_mprm
run_id: r7_flow_dpo_phase_a
split: dev
run_ledger_path: orbit-research/RUN_LEDGER.jsonl

model:
  name: ace_step_v15
  backbone: ace_step
  sample_rate: 44100
  duration_seconds: 60.0
  cfg_default: 5.0
  inference_steps: 50
  latent_rate_factor: 64

reward:
  beta_robust: 0.5
  lambda_probe:
    silence_fraction: 1.0
    autocorr_repetition: 1.0
    off_prompt_distance: 1.0
    hf_artifact_score: 0.5

baseline:
  rung_id: R7
  name: flow_dpo
  description: Flow-DPO on BoN-derived preference pairs (winner = top-1 by R_lcb, loser = bottom-1).
  seed: 0
  prompts_path: configs/prompts/dev.jsonl
  output_dir: runs/r7_flow_dpo
  bon_n: 8
  sft_steps: 1500
  lora_rank: 8
  learning_rate: 1.0e-6
  extras:
    beta_dpo: 0.1
    min_margin: 0.05
    perturbations: [identity, crop, loudness, codec, fold_down, time_shift]
